spring:
  datasource:
    url: jdbc:h2:mem:resuelve_local;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/data
  h2:
    console:
      enabled: true
      path: /h2-console
