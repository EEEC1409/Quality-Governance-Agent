name: resuelve_app
description: Aplicación móvil Resuelve — resolución de deudas para Latinoamérica
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.8.6
  connectivity_plus: ^6.0.5
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  get_it: ^7.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  bdd_widget_test: ^2.6.0
  mockito: ^5.4.4
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
